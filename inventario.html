<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fazer Inventário</title>

  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/@zxing/library@latest"></script>

  <style>
    #video {
      width: 100%;
      border-radius: 10px;
      margin: 20px 0;
      transform: scale(1.15);
    }

    .video-box {
      width: 100%;
      overflow: hidden;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Fazer Inventário</h1>

  <p>Aponte a câmera para o código de barras</p>

  <div class="video-box">
    <video id="video" autoplay muted playsinline></video>
  </div>

  <input
    type="text"
    id="codigo"
    placeholder="Código lido">

  <button onclick="salvarCodigo()" class="btn">
    Salvar Código
  </button>

  <p id="mensagem"></p>

  <a href="index.html" class="voltar">Voltar</a>
</div>

<script src="js/app.js"></script>

<script>
const codeReader = new ZXing.BrowserMultiFormatReader();

let bloqueado = false;

async function iniciarLeitor() {
  try {
    const devices = await codeReader.listVideoInputDevices();

    if (!devices || devices.length === 0) {
      document.getElementById("mensagem").innerText =
        "Nenhuma câmera encontrada.";
      return;
    }

    const camera0 = devices[0].deviceId;

    const stream = await navigator.mediaDevices.getUserMedia({
      video: {
        deviceId: { exact: camera0 },
        focusMode: "continuous"
      }
    });

    const video = document.getElementById("video");
    video.srcObject = stream;
    await video.play();

    const track = stream.getVideoTracks()[0];
    const capabilities = track.getCapabilities
      ? track.getCapabilities()
      : {};

    if (capabilities.zoom) {
      await track.applyConstraints({
        advanced: [{ zoom: 2 }]
      });
    }

    codeReader.decodeFromVideoElement(video, (result, err) => {
      if (result) {
        if (bloqueado) return;

        bloqueado = true;

        const codigo = result.text;

        document.getElementById("codigo").value = codigo;
        salvarCodigo();

        document.getElementById("mensagem").innerText =
          "Código lido: " + codigo;

        setTimeout(() => {
          bloqueado = false;
        }, 2000);
      }
    });

    document.getElementById("mensagem").innerText =
      "Leitor pronto.";

  } catch (erro) {
    document.getElementById("mensagem").innerText =
      "Erro ao acessar a câmera. Verifique a permissão do navegador.";
    console.error(erro);
  }
}

window.onload = iniciarLeitor;
</script>

</body>
</html>
