<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fazer Inventário</title>

  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/@zxing/library@latest"></script>

  <style>
    .video-container {
      width: 100%;
      overflow: hidden;
      border-radius: 10px;
      margin: 20px 0;
      background: #000;
    }

    #video {
      width: 100%;
      transform: scale(1.15);
    }

    #modalSucesso {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      align-items: center;
      justify-content: center;
      z-index: 999;
    }

    .modal-box {
      background: #fff;
      color: #111;
      padding: 25px;
      border-radius: 12px;
      text-align: center;
      width: 85%;
      max-width: 320px;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Fazer Inventário</h1>

  <p>Aponte a câmera traseira para o código de barras</p>

  <div class="video-container">
    <video id="video" autoplay muted playsinline></video>
  </div>

  <input type="text" id="codigo" placeholder="Código lido automaticamente">

  <button class="btn" onclick="salvarCodigo()">Salvar Código</button>

  <p id="mensagem"></p>

  <a href="index.html" class="voltar">Voltar</a>
</div>

<div id="modalSucesso">
  <div class="modal-box">
    <h2>Código lido com sucesso!</h2>
    <p id="codigoModal"></p>
    <button class="btn" onclick="fecharModal()">OK</button>
  </div>
</div>

<script src="js/app.js"></script>

<script>
const codeReader = new ZXing.BrowserMultiFormatReader();

let bloqueado = false;
let ultimoCodigo = "";

async function iniciarLeitor() {
  try {
    document.getElementById("mensagem").innerText = "Iniciando câmera...";

    await codeReader.decodeFromConstraints(
      {
        video: {
          facingMode: { ideal: "environment" },
          width: { ideal: 1280 },
          height: { ideal: 720 }
        }
      },
      "video",
      (result, err) => {
        if (result) {
          const codigo = result.text || result.getText();

          if (bloqueado || codigo === ultimoCodigo) return;

          bloqueado = true;
          ultimoCodigo = codigo;

          document.getElementById("codigo").value = codigo;
          salvarCodigo();

          document.getElementById("codigoModal").innerText =
            "Código: " + codigo;

          document.getElementById("modalSucesso").style.display = "flex";
        }
      }
    );

    document.getElementById("mensagem").innerText = "Leitor pronto.";

  } catch (erro) {
    document.getElementById("mensagem").innerText =
      "Erro ao abrir câmera. Verifique a permissão do navegador.";
    console.error(erro);
  }
}

function fecharModal() {
  document.getElementById("modalSucesso").style.display = "none";

  setTimeout(() => {
    bloqueado = false;
    ultimoCodigo = "";
  }, 2000);
}

window.onload = iniciarLeitor;
</script>

</body>
</html>
