<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fazer Inventário</title>

  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/@zxing/library@latest"></script>

  <style>
    .video-box {
      width: 100%;
      height: 280px;
      overflow: hidden;
      border-radius: 12px;
      background: #000;
      margin: 20px 0;
    }

    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scale(1.45);
    }

    #modalSucesso {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    .modal-box {
      background: #fff;
      color: #111;
      padding: 25px;
      border-radius: 12px;
      text-align: center;
      width: 85%;
      max-width: 320px;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Fazer Inventário</h1>

  <p>Aponte a câmera para o código de barras</p>

  <div class="video-box">
    <video id="video" autoplay muted playsinline></video>
  </div>

  <input type="text" id="codigo" placeholder="Código lido automaticamente">

  <button class="btn" onclick="salvarCodigo()">Salvar Código</button>

  <p id="mensagem">Iniciando leitor...</p>

  <a href="index.html" class="voltar">Voltar</a>
</div>

<div id="modalSucesso">
  <div class="modal-box">
    <h2>Código lido com sucesso!</h2>
    <p id="codigoModal"></p>
    <button class="btn" onclick="fecharModal()">OK</button>
  </div>
</div>

<script src="js/app.js"></script>

<script>
const codeReader = new ZXing.BrowserMultiFormatReader();

let bloqueado = false;

function iniciarLeitor() {
  codeReader.decodeFromVideoDevice(
    null,
    "video",
    (result, err) => {
      if (result) {
        if (bloqueado) return;

        bloqueado = true;

        const codigo = result.text;

        document.getElementById("codigo").value = codigo;
        salvarCodigo();

        document.getElementById("codigoModal").innerText =
          "Código: " + codigo;

        document.getElementById("modalSucesso").style.display = "flex";
        document.getElementById("mensagem").innerText =
          "Código registrado.";
      }
    }
  );

  document.getElementById("mensagem").innerText = "Leitor pronto.";
}

function fecharModal() {
  document.getElementById("modalSucesso").style.display = "none";

  setTimeout(() => {
    bloqueado = false;
  }, 2000);
}

window.onload = iniciarLeitor;
</script>

</body>
</html>
