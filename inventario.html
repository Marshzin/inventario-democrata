<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fazer Inventário</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">
  <h1>Fazer Inventário</h1>

  <div id="reader" style="width:100%; margin:20px 0;"></div>

  <input type="text" id="codigo" placeholder="Bipe ou digite o código" autofocus>

  <button onclick="salvarCodigo()" class="btn">Salvar Código</button>

  <p id="mensagem"></p>

  <a href="index.html" class="voltar">Voltar</a>
</div>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="js/app.js"></script>

<script>
  function iniciarLeitor() {
    const scanner = new Html5QrcodeScanner("reader", {
      fps: 10,
      qrbox: 250
    });

    scanner.render(function(decodedText) {
      document.getElementById("codigo").value = decodedText;
      salvarCodigo();
    });
  }

  iniciarLeitor();
</script>

</body>
</html>
