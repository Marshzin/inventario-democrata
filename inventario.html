<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fazer Inventário</title>

  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/@zxing/library@latest"></script>

  <style>
    .video-box {
      position: relative;
      width: 100%;
      height: 320px;
      overflow: hidden;
      border-radius: 12px;
      background: #000;
      margin: 20px 0;
    }

    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .mira {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 85%;
      height: 110px;
      transform: translate(-50%, -50%);
      border: 3px solid #d6a354;
      border-radius: 10px;
      box-shadow: 0 0 0 999px rgba(0,0,0,0.35);
      z-index: 2;
    }

    .linha {
      position: absolute;
      top: 50%;
      left: 10%;
      width: 80%;
      height: 3px;
      background: red;
      z-index: 3;
    }

    #modalSucesso {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    .modal-box {
      background: #fff;
      color: #111;
      padding: 25px;
      border-radius: 12px;
      text-align: center;
      width: 85%;
      max-width: 320px;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Fazer Inventário</h1>

  <p>Aponte o código de barras dentro da moldura</p>

  <div class="video-box">
    <video id="video" autoplay muted playsinline></video>
    <div class="mira"></div>
    <div class="linha"></div>
  </div>

  <input type="text" id="codigo" placeholder="Código lido automaticamente">

  <button class="btn" onclick="salvarCodigo()">Salvar Código</button>

  <p id="mensagem">Iniciando câmera...</p>

  <a href="index.html" class="voltar">Voltar</a>
</div>

<div id="modalSucesso">
  <div class="modal-box">
    <h2>Código lido com sucesso!</h2>
    <p id="codigoModal"></p>
    <button class="btn" onclick="fecharModal()">OK</button>
  </div>
</div>

<script src="js/app.js"></script>

<script>
const codeReader = new ZXing.BrowserMultiFormatReader();

let bloqueado = false;

async function iniciarLeitor() {
  try {
    document.getElementById("mensagem").innerText = "Abrindo câmera...";

    const stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: { ideal: "environment" },
        width: { ideal: 1920 },
        height: { ideal: 1080 },
        focusMode: "continuous"
      }
    });

    const video = document.getElementById("video");
    video.srcObject = stream;
    await video.play();

    const track = stream.getVideoTracks()[0];

    if (track.getCapabilities) {
      const capabilities = track.getCapabilities();

      if (capabilities.zoom) {
        await track.applyConstraints({
          advanced: [{ zoom: 2 }]
        });
      }

      if (capabilities.focusMode) {
        await track.applyConstraints({
          advanced: [{ focusMode: "continuous" }]
        });
      }
    }

    codeReader.decodeFromVideoElement(video, function(result, error) {
      if (result && !bloqueado) {
        bloqueado = true;

        const codigo = result.text;

        document.getElementById("codigo").value = codigo;
        salvarCodigo();

        document.getElementById("codigoModal").innerText = "Código: " + codigo;
        document.getElementById("modalSucesso").style.display = "flex";

        document.getElementById("mensagem").innerText = "Código registrado.";
      }
    });

    document.getElementById("mensagem").innerText = "Leitor pronto.";

  } catch (erro) {
    console.error(erro);
    document.getElementById("mensagem").innerText =
      "Erro ao abrir a câmera. Permita o acesso no navegador.";
  }
}

function fecharModal() {
  document.getElementById("modalSucesso").style.display = "none";

  setTimeout(() => {
    bloqueado = false;
  }, 2000);
}

window.onload = iniciarLeitor;
</script>

</body>
</html>
