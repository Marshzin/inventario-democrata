<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Inventário Democrata</title>

<link rel="stylesheet" href="css/style.css">

<script src="https://unpkg.com/@zxing/library@latest"></script>

<style>

.video-container{
    width:100%;
    overflow:hidden;
    border-radius:10px;
    margin:20px 0;
}

#video{
    width:100%;
    transform:scale(1.15);
}

#codigo{
    width:100%;
    padding:15px;
    font-size:18px;
    margin-top:15px;
    box-sizing:border-box;
}

</style>

</head>
<body>

<div class="container">

    <h1>Fazer Inventário</h1>

    <p>Aponte a câmera para o código de barras</p>

    <div class="video-container">
        <video
            id="video"
            autoplay
            muted
            playsinline>
        </video>
    </div>

    <input
        type="text"
        id="codigo"
        placeholder="Código lido automaticamente">

    <button
        class="btn"
        onclick="salvarCodigo()">
        Salvar Código
    </button>

    <p id="mensagem"></p>

    <a href="index.html" class="voltar">
        Voltar
    </a>

</div>

<script src="js/app.js"></script>

<script>

const codeReader =
    new ZXing.BrowserMultiFormatReader();

let bloqueado = false;

async function iniciarLeitor(){

    try{

        const stream =
            await navigator.mediaDevices.getUserMedia({

                video:{
                    facingMode:{
                        ideal:"environment"
                    }
                }

            });

        const video =
            document.getElementById("video");

        video.srcObject = stream;

        await video.play();

        const track =
            stream.getVideoTracks()[0];

        const capabilities =
            track.getCapabilities
                ? track.getCapabilities()
                : {};

        if(capabilities.zoom){

            try{

                await track.applyConstraints({
                    advanced:[
                        {
                            zoom:2
                        }
                    ]
                });

            }catch(e){
                console.log("Zoom não suportado");
            }

        }

        codeReader.decodeFromVideoElement(

            video,

            (result,err)=>{

                if(result){

                    if(bloqueado) return;

                    bloqueado = true;

                    const codigo =
                        result.getText
                        ? result.getText()
                        : result.text;

                    document.getElementById("codigo").value =
                        codigo;

                    salvarCodigo();

                    document.getElementById("mensagem").innerText =
                        "Código registrado: " + codigo;

                    setTimeout(()=>{

                        bloqueado = false;

                    },2000);

                }

            }

        );

        document.getElementById("mensagem").innerText =
            "Leitor pronto.";

    }
    catch(erro){

        console.error(erro);

        document.getElementById("mensagem").innerText =
            "Permita acesso à câmera.";

    }

}

window.onload = iniciarLeitor;

</script>

</body>
</html>
