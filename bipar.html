<script type="module">

let scanner;
let bloqueado = false;
let ultimoCodigo = "";

async function iniciarScanner() {

  const reader = document.getElementById("reader");
  const mensagem = document.getElementById("mensagem");

  try {

    scanner = new Html5Qrcode("reader");

    const cameras = await Html5Qrcode.getCameras();

    if (!cameras || cameras.length === 0) {

      mensagem.innerText = "Nenhuma câmera encontrada.";
      reader.classList.add("leitura-erro");
      return;

    }

    let cameraPrincipal = cameras.find(camera => {

      const nome = camera.label.toLowerCase();

      return (
        nome.includes("back") ||
        nome.includes("rear") ||
        nome.includes("traseira")
      ) &&
      !nome.includes("ultra") &&
      !nome.includes("0.5");

    });

    if (!cameraPrincipal) {
      cameraPrincipal = cameras[cameras.length - 1];
    }

    await scanner.start(

      cameraPrincipal.id,

      {
        fps: 10,

        qrbox: {
          width: 300,
          height: 130
        },

        formatsToSupport: [
          Html5QrcodeSupportedFormats.EAN_13,
          Html5QrcodeSupportedFormats.EAN_8,
          Html5QrcodeSupportedFormats.UPC_A,
          Html5QrcodeSupportedFormats.UPC_E,
          Html5QrcodeSupportedFormats.CODE_128,
          Html5QrcodeSupportedFormats.CODE_39
        ]
      },

      async codigoLido => {

        if (bloqueado) return;

        if (codigoLido === ultimoCodigo) return;

        const reader =
          document.getElementById("reader");

        const mensagem =
          document.getElementById("mensagem");

        if (!codigoLido.startsWith("78")) {

          reader.classList.remove("leitura-ok");
          reader.classList.add("leitura-erro");

          mensagem.innerText =
            "Código ignorado. Apenas códigos iniciados por 78 são aceitos.";

          setTimeout(() => {

            reader.classList.remove("leitura-erro");

          }, 1500);

          return;

        }

        ultimoCodigo = codigoLido;
        bloqueado = true;

        reader.classList.remove("leitura-erro");
        reader.classList.add("leitura-ok");

        document.getElementById("codigo").value =
          codigoLido;

        await window.salvarCodigo(codigoLido);

        document.getElementById("codigoModal").innerText =
          "Código: " + codigoLido;

        document.getElementById("modal").style.display =
          "flex";

        mensagem.innerText =
          "Produto registrado com sucesso.";

      }

    );

    mensagem.innerText = "Leitor pronto.";

  } catch (erro) {

    console.error(erro);

    mensagem.innerText =
      "Erro ao abrir câmera.";

  }

}

window.continuarBipagem = function() {

  const reader =
    document.getElementById("reader");

  const mensagem =
    document.getElementById("mensagem");

  document.getElementById("modal").style.display =
    "none";

  document.getElementById("codigo").value =
    "";

  reader.classList.remove("leitura-ok");
  reader.classList.remove("leitura-erro");

  mensagem.innerText =
    "Aguardando 2 segundos...";

  setTimeout(() => {

    bloqueado = false;
    ultimoCodigo = "";

    mensagem.innerText =
      "Pronto para nova leitura.";

  }, 2000);

};

window.salvarManual = async function() {

  const codigo =
    document.getElementById("codigo")
      .value
      .trim();

  const reader =
    document.getElementById("reader");

  const mensagem =
    document.getElementById("mensagem");

  if (codigo === "") {

    mensagem.innerText =
      "Digite um código.";

    return;

  }

  if (!codigo.startsWith("78")) {

    reader.classList.remove("leitura-ok");
    reader.classList.add("leitura-erro");

    mensagem.innerText =
      "Código ignorado. Apenas códigos iniciados por 78 são aceitos.";

    return;

  }

  await window.salvarCodigo(codigo);

  reader.classList.remove("leitura-erro");
  reader.classList.add("leitura-ok");

  document.getElementById("codigoModal").innerText =
    "Código: " + codigo;

  document.getElementById("modal").style.display =
    "flex";

  bloqueado = true;

};

window.onload = iniciarScanner;

</script>
