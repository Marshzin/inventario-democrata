<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bipar Produtos</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>

<div class="container">
  <h1>Bipar Produtos</h1>
  <p>Aponte a câmera para o código de barras iniciado por 78.</p>

  <div id="reader"></div>

  <input type="text" id="codigo" placeholder="Código lido">

  <button class="btn" onclick="salvarManual()">Salvar Manualmente</button>

  <p id="mensagem"></p>

  <a href="index.html" class="voltar">Voltar</a>
</div>

<div id="modal">
  <div class="modal-box">
    <h2>Código lido com sucesso!</h2>
    <p id="codigoModal"></p>
    <button class="btn" onclick="continuarBipagem()">OK</button>
  </div>
</div>

<script src="js/app.js"></script>

<script>
let scanner;
let bloqueado = false;

function iniciarScanner() {
  scanner = new Html5Qrcode("reader");

  scanner.start(
    { facingMode: "environment" },
    {
      fps: 10,
      qrbox: { width: 300, height: 130 },
      formatsToSupport: [
        Html5QrcodeSupportedFormats.EAN_13,
        Html5QrcodeSupportedFormats.EAN_8,
        Html5QrcodeSupportedFormats.UPC_A,
        Html5QrcodeSupportedFormats.UPC_E,
        Html5QrcodeSupportedFormats.CODE_128,
        Html5QrcodeSupportedFormats.CODE_39
      ]
    },
    codigoLido => {
      if (!codigoLido.startsWith("78")) {
        document.getElementById("mensagem").innerText =
          "Código ignorado. Apenas códigos iniciados por 78 são aceitos.";
        return;
      }

      if (bloqueado) return;

      bloqueado = true;

      document.getElementById("codigo").value = codigoLido;
      salvarCodigo(codigoLido);

      document.getElementById("codigoModal").innerText =
        "Código: " + codigoLido;

      document.getElementById("modal").style.display = "flex";
      document.getElementById("mensagem").innerText = "Produto registrado.";

      scanner.stop();
    }
  ).catch(() => {
    document.getElementById("mensagem").innerText =
      "Erro ao abrir câmera. Permita o acesso no navegador.";
  });
}

function continuarBipagem() {
  document.getElementById("modal").style.display = "none";
  document.getElementById("codigo").value = "";
  bloqueado = false;
  iniciarScanner();
}

function salvarManual() {
  const codigo = document.getElementById("codigo").value.trim();

  if (codigo === "") {
    alert("Digite ou bipe um código.");
    return;
  }

  salvarCodigo(codigo);

  if (!codigo.startsWith("78")) return;

  document.getElementById("codigoModal").innerText =
    "Código: " + codigo;

  document.getElementById("modal").style.display = "flex";
}

window.onload = iniciarScanner;
</script>

</body>
</html>
