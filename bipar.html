<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bipar Produtos</title>

  <link rel="stylesheet" href="css/style.css">

  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>

<body>

<div class="container">
  <h1>Bipar Produtos</h1>
  <p>Aponte a câmera para o código de barras iniciado por 78 ou 79.</p>

  <div id="reader"></div>

  <input type="text" id="codigo" placeholder="Código lido">

  <button class="btn" onclick="salvarManual()">Salvar Manualmente</button>

  <p id="mensagem"></p>

  <a href="index.html" class="voltar">Voltar</a>
</div>

<div id="modal">
  <div class="modal-box">
    <h2>Código lido com sucesso!</h2>
    <p id="codigoModal"></p>
    <button class="btn" onclick="continuarBipagem()">OK</button>
  </div>
</div>

<script type="module" src="js/app.js"></script>

<script type="module">
let scanner;
let bloqueado = false;
let ultimoCodigo = "";
let timerModal = null;

function codigoPermitido(codigo) {
  return codigo.startsWith("78") || codigo.startsWith("79");
}

function mostrarErro(texto) {
  const reader = document.getElementById("reader");
  const mensagem = document.getElementById("mensagem");

  reader.classList.remove("leitura-ok");
  reader.classList.add("leitura-erro");

  mensagem.innerText = texto;

  setTimeout(() => {
    reader.classList.remove("leitura-erro");
    mensagem.innerText = "";
  }, 2000);
}

async function registrarCodigo(codigo) {
  const reader = document.getElementById("reader");
  const mensagem = document.getElementById("mensagem");

  if (!codigoPermitido(codigo)) {
    mostrarErro("Código ignorado. Apenas códigos iniciados por 78 ou 79 são aceitos.");
    return;
  }

  bloqueado = true;
  ultimoCodigo = codigo;

  const salvo = await window.salvarCodigo(codigo);

  if (!salvo) {
    bloqueado = false;
    ultimoCodigo = "";
    mostrarErro("Produto não encontrado no pivot.xlsx. Código não adicionado.");
    return;
  }

  const descricao = await window.obterDescricaoProduto(codigo);

  reader.classList.remove("leitura-erro");
  reader.classList.add("leitura-ok");

  document.getElementById("codigo").value = codigo;

  document.getElementById("codigoModal").innerHTML =
    "<strong>Código:</strong> " + codigo + "<br><br>" +
    "<strong>Produto:</strong> " + descricao;

  document.getElementById("modal").style.display = "flex";

  mensagem.innerText = "Produto registrado com sucesso.";

  if (timerModal) clearTimeout(timerModal);

  timerModal = setTimeout(() => {
    continuarBipagem();
  }, 2000);
}

async function iniciarScanner() {
  const reader = document.getElementById("reader");
  const mensagem = document.getElementById("mensagem");

  try {
    scanner = new Html5Qrcode("reader");

    const cameras = await Html5Qrcode.getCameras();

    if (!cameras || cameras.length === 0) {
      mensagem.innerText = "Nenhuma câmera encontrada.";
      reader.classList.add("leitura-erro");
      return;
    }

    let cameraPrincipal = cameras.find(camera => {
      const nome = camera.label.toLowerCase();

      return (
        nome.includes("back") ||
        nome.includes("rear") ||
        nome.includes("traseira")
      ) &&
      !nome.includes("ultra") &&
      !nome.includes("0.5");
    });

    if (!cameraPrincipal) {
      cameraPrincipal = cameras[cameras.length - 1];
    }

    await scanner.start(
      cameraPrincipal.id,
      {
        fps: 10,
        qrbox: {
          width: 300,
          height: 130
        },
        formatsToSupport: [
          Html5QrcodeSupportedFormats.EAN_13,
          Html5QrcodeSupportedFormats.EAN_8,
          Html5QrcodeSupportedFormats.UPC_A,
          Html5QrcodeSupportedFormats.UPC_E,
          Html5QrcodeSupportedFormats.CODE_128,
          Html5QrcodeSupportedFormats.CODE_39
        ]
      },
      async codigoLido => {
        if (bloqueado) return;
        if (codigoLido === ultimoCodigo) return;

        await registrarCodigo(codigoLido);
      }
    );

    mensagem.innerText = "Leitor pronto.";

  } catch (erro) {
    console.error(erro);
    mensagem.innerText = "Erro ao abrir câmera. Permita o acesso no navegador.";
    reader.classList.add("leitura-erro");
  }
}

window.continuarBipagem = function() {
  const reader = document.getElementById("reader");
  const mensagem = document.getElementById("mensagem");

  if (timerModal) {
    clearTimeout(timerModal);
    timerModal = null;
  }

  document.getElementById("modal").style.display = "none";
  document.getElementById("codigo").value = "";

  reader.classList.remove("leitura-ok");
  reader.classList.remove("leitura-erro");

  mensagem.innerText = "Aguardando 2 segundos...";

  setTimeout(() => {
    bloqueado = false;
    ultimoCodigo = "";
    mensagem.innerText = "Pronto para nova leitura.";
  }, 2000);
};

window.salvarManual = async function() {
  const codigo = document.getElementById("codigo").value.trim();

  if (codigo === "") {
    mostrarErro("Digite um código.");
    return;
  }

  if (bloqueado) return;

  await registrarCodigo(codigo);
};

window.onload = iniciarScanner;
</script>

</body>
</html>
