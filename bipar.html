<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bipar Produtos</title>

  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/html5-qrcode"></script>
</head>

<body>

<div class="container">
  <h1>Bipar Produtos</h1>
  <p>Aponte a câmera para o código de barras iniciado por 78.</p>

  <div id="reader"></div>

  <input type="text" id="codigo" placeholder="Código lido">

  <button class="btn" onclick="salvarManual()">Salvar Manualmente</button>

  <p id="mensagem"></p>

  <a href="index.html" class="voltar">Voltar</a>
</div>

<div id="modal">
  <div class="modal-box">
    <h2>Código lido com sucesso!</h2>
    <p id="codigoModal"></p>
    <button class="btn" onclick="continuarBipagem()">OK</button>
  </div>
</div>

<script type="module" src="js/app.js"></script>

<script type="module">
let scanner;
let bloqueado = false;

async function iniciarScanner() {
  const reader = document.getElementById("reader");
  const mensagem = document.getElementById("mensagem");

  try {
    scanner = new Html5Qrcode("reader");

    const cameras = await Html5Qrcode.getCameras();

    if (!cameras || cameras.length === 0) {
      mensagem.innerText = "Nenhuma câmera encontrada.";
      reader.classList.add("leitura-erro");
      return;
    }

    let cameraPrincipal = cameras.find(camera => {
      const nome = camera.label.toLowerCase();

      return (
        nome.includes("back") ||
        nome.includes("rear") ||
        nome.includes("traseira") ||
        nome.includes("environment")
      ) &&
      !nome.includes("ultra") &&
      !nome.includes("0.5") &&
      !nome.includes("wide angle");
    });

    if (!cameraPrincipal) {
      cameraPrincipal = cameras.find(camera => {
        const nome = camera.label.toLowerCase();

        return (
          nome.includes("camera 1") ||
          nome.includes("camera2 0") ||
          nome.includes("back camera")
        );
      });
    }

    if (!cameraPrincipal) {
      cameraPrincipal = cameras[cameras.length - 1];
    }

    await scanner.start(
      cameraPrincipal.id,
      {
        fps: 10,
        qrbox: {
          width: 300,
          height: 130
        },
        aspectRatio: 1.777,
        formatsToSupport: [
          Html5QrcodeSupportedFormats.EAN_13,
          Html5QrcodeSupportedFormats.EAN_8,
          Html5QrcodeSupportedFormats.UPC_A,
          Html5QrcodeSupportedFormats.UPC_E,
          Html5QrcodeSupportedFormats.CODE_128,
          Html5QrcodeSupportedFormats.CODE_39
        ]
      },
      async codigoLido => {
        if (bloqueado) return;

        if (!codigoLido.startsWith("78")) {
          reader.classList.remove("leitura-ok");
          reader.classList.add("leitura-erro");

          mensagem.innerText =
            "Código ignorado. Apenas códigos iniciados por 78 são aceitos.";

          setTimeout(() => {
            reader.classList.remove("leitura-erro");
            mensagem.innerText = "";
          }, 1500);

          return;
        }

        bloqueado = true;

        reader.classList.remove("leitura-erro");
        reader.classList.add("leitura-ok");

        document.getElementById("codigo").value = codigoLido;

        await window.salvarCodigo(codigoLido);

        document.getElementById("codigoModal").innerText =
          "Código: " + codigoLido;

        document.getElementById("modal").style.display = "flex";

        mensagem.innerText = "Produto registrado com sucesso.";
      }
    );

    mensagem.innerText = "Câmera pronta.";

  } catch (erro) {
    console.error(erro);
    mensagem.innerText =
      "Erro ao abrir câmera. Permita o acesso no navegador.";
    reader.classList.add("leitura-erro");
  }
}

window.continuarBipagem = function() {
  const reader = document.getElementById("reader");

  document.getElementById("modal").style.display = "none";
  document.getElementById("codigo").value = "";
  document.getElementById("mensagem").innerText = "";

  reader.classList.remove("leitura-ok");
  reader.classList.remove("leitura-erro");

  setTimeout(() => {
    bloqueado = false;
  }, 500);
};

window.salvarManual = async function() {
  const codigo = document.getElementById("codigo").value.trim();
  const reader = document.getElementById("reader");
  const mensagem = document.getElementById("mensagem");

  if (codigo === "") {
    reader.classList.add("leitura-erro");
    mensagem.innerText = "Digite um código.";
    return;
  }

  if (!codigo.startsWith("78")) {
    reader.classList.remove("leitura-ok");
    reader.classList.add("leitura-erro");
    mensagem.innerText =
      "Código ignorado. Apenas códigos iniciados por 78 são aceitos.";
    return;
  }

  reader.classList.remove("leitura-erro");
  reader.classList.add("leitura-ok");

  await window.salvarCodigo(codigo);

  document.getElementById("codigoModal").innerText =
    "Código: " + codigo;

  document.getElementById("modal").style.display = "flex";

  mensagem.innerText = "Produto registrado com sucesso.";
};

window.onload = iniciarScanner;
</script>

</body>
</html>
